<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Герои Асханы</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">ГА</div>
          <div>
            <p class="eyebrow">Pathfinder 1e</p>
            <h1>Герои Асханы</h1>
          </div>
        </div>

        <nav class="nav" aria-label="Разделы">
          <button class="nav-item active" data-view="dashboard">Обзор</button>
          <button class="nav-item" data-view="wiki">Wiki</button>
          <button class="nav-item" data-view="map">Карта</button>
          <button class="nav-item" data-view="characters">Персонажи</button>
          <button class="nav-item" data-view="gallery">Галерея</button>
          <button class="nav-item" data-view="quests">Задания</button>
          <button class="nav-item" data-view="roller">Roll</button>
          <button class="nav-item" data-view="admin">Админ</button>
        </nav>

        <div class="sidebar-footer">
          <span id="adminBadge" class="status-pill">режим игрока</span>
          <button id="quickLoginButton" class="ghost-button">Войти</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input id="globalSearch" type="search" placeholder="Поиск по Асхане" />
          </div>
          <div class="topbar-actions">
            <select id="activeCharacterSelect" aria-label="Активный персонаж"></select>
            <button id="resetViewButton" class="icon-button" title="На обзор">⌂</button>
          </div>
        </header>

        <section id="viewRoot" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="loginDialog" class="dialog">
      <form method="dialog" class="dialog-panel" id="loginForm">
        <div>
          <p class="eyebrow">Редактирование Асханы</p>
          <h2>Вход мастера</h2>
        </div>
        <label>
          Email
          <input id="loginEmail" type="email" autocomplete="username" />
        </label>
        <label>
          Пароль
          <input id="adminPassword" type="password" autocomplete="current-password" />
        </label>
        <p id="loginError" class="form-error" hidden>Не удалось войти</p>
        <div class="dialog-actions">
          <button value="cancel" class="ghost-button" type="button" id="cancelLogin">Отмена</button>
          <button value="default" class="primary-button" type="submit">Войти</button>
        </div>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="app.js" charset="UTF-8"></script>
  </body>
</html>
